# GPU override — use with: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Requires NVIDIA Container Toolkit on the host.
# Build the image with SPEAKER_PROFILE=gpu first (see README).
services:
  backend:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
