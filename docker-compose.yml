services:
  # 後端 API 服務
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # none = 僅 requirements.txt（預設）；cpu / gpu = 安裝 pyannote 額外套件（映像較大、建置較久）
        SPEAKER_PROFILE: ${SPEAKER_PROFILE:-none}
    container_name: yt-transcripter-backend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SPEAKER_PROFILE=${SPEAKER_PROFILE:-none}
      - PYANNOTE_AUTH_TOKEN=${PYANNOTE_AUTH_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - YT_DLP_COOKIES_FILE=${YT_DLP_COOKIES_FILE:-}
      - YT_DLP_COOKIES_FROM_BROWSER=${YT_DLP_COOKIES_FROM_BROWSER:-}
      - YT_DLP_BROWSER_PROFILE=${YT_DLP_BROWSER_PROFILE:-}
      - YT_DLP_BROWSER_CONTAINER=${YT_DLP_BROWSER_CONTAINER:-}
    volumes:
      - ./downloads:/app/downloads
      - ./transcripts:/app/transcripts
      - ./secrets:/app/secrets
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服務 (含 nginx 反向代理)
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: yt-transcripter-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

